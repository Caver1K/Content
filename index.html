<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Content Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 20px;
    }
    h1 {
        font-size: 36px;
        margin-bottom: 20px;
        text-align: center;
        color: #4db8ff;
        word-break: break-all;
    }
    #file-list {
        max-width: 900px;
        margin: 0 auto;
        background: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
    }
    .item {
        padding: 10px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
    }
    .item:last-child {
        border-bottom: none;
    }
    .left a {
        color: #4db8ff;
        text-decoration: none;
        font-size: 18px;
    }
    .left a:hover {
        text-decoration: underline;
    }
    .folder {
        font-weight: bold;
    }
    .back {
        margin-bottom: 15px;
        display: inline-block;
        color: #ffcc66;
    }
    .copy-btn {
        cursor: pointer;
        width: 22px;
        height: 22px;
        fill: #ccc;
        transition: 0.15s;
    }
    .copy-btn:hover {
        fill: #fff;
    }
    .copied {
        fill: #4dff4d !important;
    }
    .copied-text {
        position: absolute;
        right: 40px;
        color: #4dff4d;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .copied-text.show {
        opacity: 1;
    }
</style>
</head>
<body>

<h1 id="header">Content/</h1>

<div id="file-list">Loading…</div>

<script>
const username = "Caver1K";
const repo = "Content";
let currentPath = "";

function updateHeader() {
    const header = document.getElementById("header");
    header.textContent = currentPath === "" ? "Content/" : "Content/" + currentPath + "/";
}

async function loadPath(path = "") {
    currentPath = path;
    updateHeader();

    const container = document.getElementById("file-list");
    container.innerHTML = "Loading…";

    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
    const response = await fetch(apiUrl);
    const data = await response.json();

    container.innerHTML = "";

    if (path !== "") {
        const up = path.split("/").slice(0, -1).join("/");
        container.innerHTML += `<a class="back" href="#" onclick="loadPath('${up}')">⬅ Back</a>`;
    }

    data.forEach(item => {
        const isDir = item.type === "dir";
        const name = item.name;

        const localUrl = `https://content.caver1k.net/${item.path}`;

        container.innerHTML += `
            <div class="item">
                <div class="left">
                    <a class="${isDir ? "folder" : ""}" 
                       href="${isDir ? "#" : localUrl}" 
                       ${isDir ? `onclick="loadPath('${item.path}')" ` : `target="_blank"`}>
                        ${isDir ? "📁" : "📄"} ${name}
                    </a>
                </div>

                ${!isDir ? `
                    <svg class="copy-btn" onclick="copyLink('${localUrl}', this)" viewBox="0 0 24 24">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v16c0 1.1.9 2 
                        2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 18H8V7h11v16z"/>
                    </svg>
                    <span class="copied-text">Copied!</span>
                ` : ""}
            </div>
        `;
    });
}

function copyLink(url, iconElement) {
    navigator.clipboard.writeText(url);

    iconElement.classList.add("copied");

    const text = iconElement.parentElement.querySelector(".copied-text");
    text.classList.add("show");

    setTimeout(() => {
        iconElement.classList.remove("copied");
        text.classList.remove("show");
    }, 1000);
}

loadPath();
</script>

</body>
</html>
